#Configuracion HTTP
<VirtualHost *:80>

    <IfModule mod_rewrite.c>
      RewriteEngine On
      RewriteRule .* - [E=HTTP_AUTHORIZATION:%{HTTP:Authorization}]
    </IfModule>

    #Configuracion de Vhost del dominio
    ServerAdmin informes@devdigitalcoud.com
    ServerName api.devexamine.com
    DocumentRoot /var/www/html/public

    #Otras Configuraciones
    TimeOut 3600
    # Para habilitar .htacces en el proyecto
    <Directory "/var/www/html/public">
        Options FollowSymLinks
        AllowOverride All
        Order allow,deny
        Allow from all
    </Directory>

    #Configuracion Origin
    Header set Access-Control-Allow-Origin: "*"
    Header set Access-Control-Allow-Credentials: "true"
    Header set Access-Control-Allow-Headers: "X-Custom-Header,Access-Control-Allow-Headers,Authorization,X-Requested-With"
</VirtualHost>
