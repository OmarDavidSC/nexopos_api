services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - 8082:80
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - ./config/000-default.conf:/etc/apache2/sites-available/000-default.conf
    networks:
      - hercepsolutions_default

networks:
  hercepsolutions_default:
    name: hercepsolutions_default